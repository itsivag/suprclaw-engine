services:
  # ─────────────────────────────────────────────
  # SuprClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm suprclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  suprclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: suprclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.suprclaw/config.json:ro
      - suprclaw-workspace:/root/.suprclaw/workspace
      - suprclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["suprclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # SuprClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  suprclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: suprclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.suprclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - suprclaw-workspace:/root/.suprclaw/workspace
      # NPM cache for faster MCP server installs
      - suprclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  suprclaw-workspace:
  suprclaw-npm-cache: # Cache npm packages to speed up MCP server installations
