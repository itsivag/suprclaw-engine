services:
  # ─────────────────────────────────────────────
  # SuprClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm suprclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  suprclaw-agent:
    image: docker.io/sipeed/suprclaw:latest
    container_name: suprclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.suprclaw
    entrypoint: ["suprclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # SuprClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  suprclaw-gateway:
    image: docker.io/sipeed/suprclaw:latest
    container_name: suprclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.suprclaw

  # ─────────────────────────────────────────────
  # SuprClaw Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  suprclaw-launcher:
    image: docker.io/sipeed/suprclaw:launcher
    container_name: suprclaw-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - SUPRCLAW_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.suprclaw
