[unix_http_server]
file=/tmp/supervisor.sock
chmod=0770
chown=root:suprclaw

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:suprclaw-engine-gateway]
command=/usr/local/bin/start-gateway-with-mcp-wait.sh
autorestart=true
priority=10
stdout_logfile=/var/log/suprclaw-engine-gateway.log
stderr_logfile=/var/log/suprclaw-engine-gateway.err
