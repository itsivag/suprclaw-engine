name: Runtime Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "website/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/suprclaw-engine
  GHCR_USERNAME: ${{ secrets.GHCR_PUSH_USERNAME != '' && secrets.GHCR_PUSH_USERNAME || github.actor }}
  GHCR_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN != '' && secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Push Runtime Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runtime/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_NAME }}:latest
            ${{ env.GHCR_IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64
