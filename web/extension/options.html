<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SuprClaw Relay Options</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel options">
    <h1>Relay Options</h1>
    <label>
      Relay WebSocket URL
      <input id="relayUrl" type="text" placeholder="ws://127.0.0.1:18800/browser-relay/extension" />
    </label>
    <label>
      Token
      <input id="token" type="password" placeholder="relay token" />
    </label>

    <div class="row">
      <button id="saveBtn">Save</button>
      <button id="testBtn" class="secondary">Test Connection</button>
    </div>

    <pre id="diagnostics" class="diag"></pre>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
