<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SuprClaw Relay Options</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel options">
    <h1>Relay Options</h1>
    <label>
      Relay WebSocket URL
      <input id="relayUrl" type="text" placeholder="wss://api.suprclaw.com/browser-relay/extension" />
    </label>
    <label>
      Token (optional)
      <input id="token" type="password" placeholder="relay token (auto-setup if empty)" />
    </label>

    <div class="row">
      <button id="googleSignInBtn">Google Sign-In</button>
      <button id="googleSignOutBtn" class="secondary">Sign Out</button>
    </div>
    <div id="authStatus" class="muted"></div>

    <div class="row">
      <button id="autoSetupBtn">Auto Setup</button>
      <button id="saveBtn">Save</button>
      <button id="testBtn" class="secondary">Test Connection</button>
    </div>

    <pre id="diagnostics" class="diag"></pre>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
