<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SuprClaw Relay</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel">
    <h1>SuprClaw Relay</h1>
    <p id="status" class="status">Disconnected</p>
    <div class="row">
      <button id="connectBtn">Connect Relay</button>
      <button id="optionsBtn" class="secondary">Options</button>
    </div>
    <div class="row">
      <button id="attachBtn">Attach Tab</button>
      <button id="detachBtn" class="secondary">Detach Tab</button>
    </div>
    <p id="tabMeta" class="meta"></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
