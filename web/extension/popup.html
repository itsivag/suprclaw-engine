<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SuprClaw Relay</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel">
    <h1>SuprClaw Relay</h1>
    <p id="status" class="status">Disconnected</p>
    <div class="row">
      <button id="optionsBtn" class="secondary">Options</button>
    </div>
    <div class="row">
      <button id="pairBtn">Pair Mobile (QR)</button>
    </div>
    <section id="pairingPanel" class="pairing hidden">
      <img id="pairQrImg" alt="Mobile pairing QR code" />
      <p id="pairMeta" class="meta"></p>
      <a id="pairClaimUrl" target="_blank" rel="noreferrer">Claim URL</a>
    </section>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
